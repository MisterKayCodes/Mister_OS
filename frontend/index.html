<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mister OS</title>
    <!-- Tailwind CSS for Apple Notes UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f9f9f9; }
        .sidebar { background-color: #f3f3f3; border-right: 1px solid #e0e0e0; }
        .note-item:hover { background-color: #e8e8e8; }
        .note-item.active { background-color: #ffe0b2; } /* Subtle orange/yellow for Apple Notes feel */
        textarea { resize: none; }
        textarea:focus { outline: none; }
    </style>
</head>
<body class="h-screen overflow-hidden text-gray-800">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE = "http://localhost:8000/api/notes";
        
        function App() {
            const [token, setToken] = useState(localStorage.getItem("master_token") || "");
            const [isAuthenticated, setIsAuthenticated] = useState(!!token);
            const [notes, setNotes] = useState([]);
            const [activeNote, setActiveNote] = useState(null);
            const [content, setContent] = useState("");

            useEffect(() => {
                if (isAuthenticated) {
                    fetchNotes();
                }
            }, [isAuthenticated]);

            const fetchNotes = async () => {
                try {
                    const res = await fetch(`${API_BASE}/`, {
                        headers: { "X-Master-Token": token }
                    });
                    if (res.status === 403) {
                        setIsAuthenticated(false);
                        localStorage.removeItem("master_token");
                        alert("Invalid Master Token");
                        return;
                    }
                    const data = await res.json();
                    setNotes(data);
                    if (data.length > 0 && !activeNote) {
                        selectNote(data[0]);
                    }
                } catch (err) {
                    console.error("Failed to fetch notes", err);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                localStorage.setItem("master_token", token);
                setIsAuthenticated(true);
            };

            const createNote = async () => {
                try {
                    const res = await fetch(`${API_BASE}/`, {
                        method: "POST",
                        headers: { 
                            "Content-Type": "application/json",
                            "X-Master-Token": token
                        },
                        body: JSON.stringify({ content: "New Note", title: "Untitled Note" })
                    });
                    const newNote = await res.json();
                    setNotes([newNote, ...notes]);
                    selectNote(newNote);
                } catch (err) {
                    console.error(err);
                }
            };

            const saveNote = async (id, newContent) => {
                try {
                    await fetch(`${API_BASE}/${id}`, {
                        method: "PUT",
                        headers: { 
                            "Content-Type": "application/json",
                            "X-Master-Token": token
                        },
                        body: JSON.stringify({ content: newContent })
                    });
                    fetchNotes(); // Refresh list to get updated titles
                } catch (err) {
                    console.error(err);
                }
            };

            const selectNote = (note) => {
                setActiveNote(note);
                setContent(note.content);
            };

            // Auto-save debounce logic (simple version)
            useEffect(() => {
                if (!activeNote) return;
                const timer = setTimeout(() => {
                    if (content !== activeNote.content) {
                        saveNote(activeNote.id, content);
                    }
                }, 1000);
                return () => clearTimeout(timer);
            }, [content]);

            if (!isAuthenticated) {
                return (
                    <div className="flex h-screen items-center justify-center bg-gray-100">
                        <form onSubmit={handleLogin} className="bg-white p-8 rounded-lg shadow-md w-96">
                            <h2 className="text-2xl font-semibold mb-6 text-center">Mister OS</h2>
                            <p className="text-sm text-gray-500 mb-4 text-center">Enter Master Token to access your Second Brain.</p>
                            <input 
                                type="password" 
                                value={token}
                                onChange={(e) => setToken(e.target.value)}
                                className="w-full border border-gray-300 p-2 rounded mb-4" 
                                placeholder="Master Token"
                            />
                            <button type="submit" className="w-full bg-black text-white p-2 rounded font-medium">Access</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="flex h-full">
                    {/* Sidebar */}
                    <div className="w-72 sidebar flex flex-col">
                        <div className="p-4 flex justify-between items-center border-b border-gray-200">
                            <h1 className="font-semibold text-lg text-gray-700">Mister OS</h1>
                            <button onClick={createNote} className="text-gray-500 hover:text-black">
                                <i data-lucide="edit"></i> +
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto">
                            {notes.map(note => (
                                <div 
                                    key={note.id} 
                                    onClick={() => selectNote(note)}
                                    className={`note-item p-4 cursor-pointer border-b border-gray-200 ${activeNote?.id === note.id ? 'active' : ''}`}
                                >
                                    <h3 className="font-medium text-sm truncate">{note.title}</h3>
                                    <p className="text-xs text-gray-500 mt-1">
                                        {new Date(note.updated_at).toLocaleDateString()}
                                    </p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Editor */}
                    <div className="flex-1 bg-white flex flex-col">
                        {activeNote ? (
                            <div className="flex-1 p-8">
                                <p className="text-xs text-gray-400 mb-4 text-center">
                                    {new Date(activeNote.updated_at).toLocaleString()}
                                </p>
                                <textarea 
                                    className="w-full h-full text-lg leading-relaxed text-gray-800"
                                    value={content}
                                    onChange={(e) => setContent(e.target.value)}
                                    placeholder="Start typing..."
                                />
                            </div>
                        ) : (
                            <div className="flex-1 flex items-center justify-center text-gray-400">
                                Select or create a note.
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
    <script>
        // Initialize lucide icons after react render
        setTimeout(() => { lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
